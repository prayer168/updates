<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="黑熊老師自然科學數位教材中心網站優化檢核表">
  <title>黑熊老師網站優化檢核表</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="checklist-data.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <p class="eyebrow">🐻 黑熊老師自然科學數位教材中心</p>
      <h1>網站優化檢核表</h1>
      <p>完成一項就按一下。紀錄會自動儲存到遠端資料庫。</p>
    </div>
  </header>

  <main class="wrap">
    <section class="summary" aria-label="完成進度">
      <div>
        <strong id="progressText">載入中…</strong>
        <p id="syncStatus">正在連接遠端資料庫</p>
      </div>
      <div class="progress" aria-hidden="true">
        <div id="progressBar"></div>
      </div>
    </section>

    <div id="message" class="message hidden" role="alert"></div>
    <div id="checklist"></div>
  </main>

  <footer>
    <div class="wrap">完成狀態儲存在 Supabase 遠端資料庫。</div>
  </footer>
</body>
</html>
